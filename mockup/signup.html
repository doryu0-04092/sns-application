<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>新規登録 | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrap">
    <h1>新規登録</h1>
    <form onsubmit="event.preventDefault(); location.href='timeline.html';">
      <div class="field">
        <label for="displayName">表示名</label>
        <input type="text" id="displayName" placeholder="例: 山田 太郎" />
      </div>
      <div class="field">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="8文字以上" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">登録する</button>
    </form>
    <p class="auth-switch">アカウントをお持ちの方は <a href="login.html">ログイン</a></p>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
