<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>フォロー中 / フォロワー | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="logo" href="timeline.html">SNS App</a>
      <nav>
        <a href="timeline.html">タイムライン</a>
        <a href="user-search.html">ユーザー検索</a>
        <a href="profile.html">プロフィール</a>
      </nav>
      <div class="me">
        <a href="profile.html" class="me-link">
          <div class="avatar sm" data-me-avatar>太</div>
          <span data-me-name>山田 太郎</span>
        </a>
        <a href="login.html" class="link-btn">ログアウト</a>
      </div>
    </header>

    <div class="tabs" data-tabs>
      <button type="button" class="tab is-active" data-feed="following">フォロー中</button>
      <button type="button" class="tab" data-feed="followers">フォロワー</button>
    </div>

    <div data-feed-panel="following">
      <div class="user-row">
        <a href="profile.html"><div class="avatar">花</div></a>
        <div class="info">
          <div class="name">佐藤 花子</div>
          <div class="handle">@hanako_sato</div>
        </div>
        <button class="btn btn-follow" type="button" data-user-id="hanako_sato">フォローする</button>
      </div>
      <div class="user-row">
        <a href="profile.html"><div class="avatar">健</div></a>
        <div class="info">
          <div class="name">高橋 健</div>
          <div class="handle">@ken_takahashi</div>
        </div>
        <button class="btn btn-follow" type="button" data-user-id="ken_takahashi">フォローする</button>
      </div>
      <div class="user-row">
        <a href="profile.html"><div class="avatar">美</div></a>
        <div class="info">
          <div class="name">田中 美咲</div>
          <div class="handle">@misaki_tanaka</div>
        </div>
        <button class="btn btn-follow" type="button" data-user-id="misaki_tanaka">フォローする</button>
      </div>
    </div>

    <div data-feed-panel="followers" style="display:none;">
      <div class="user-row">
        <a href="profile.html"><div class="avatar">鈴</div></a>
        <div class="info">
          <div class="name">鈴木 一郎</div>
          <div class="handle">@ichiro_suzuki</div>
        </div>
        <button class="btn btn-follow" type="button" data-user-id="ichiro_suzuki">フォローする</button>
      </div>
      <div class="user-row">
        <a href="profile.html"><div class="avatar">花</div></a>
        <div class="info">
          <div class="name">佐藤 花子</div>
          <div class="handle">@hanako_sato</div>
        </div>
        <button class="btn btn-follow" type="button" data-user-id="hanako_sato">フォローする</button>
      </div>
    </div>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
