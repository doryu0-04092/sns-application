<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ログイン | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrap">
    <h1>ログイン</h1>
    <form onsubmit="event.preventDefault(); location.href='timeline.html';">
      <div class="field">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" value="taro.yamada@example.com" />
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input type="password" id="password" value="password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">ログイン</button>
    </form>
    <p class="auth-switch">アカウントをお持ちでない方は <a href="signup.html">新規登録</a></p>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
