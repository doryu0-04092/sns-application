<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>タイムライン | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="logo" href="timeline.html">SNS App</a>
      <nav>
        <a href="timeline.html">タイムライン</a>
        <a href="user-search.html">ユーザー検索</a>
        <a href="profile.html">プロフィール</a>
      </nav>
      <div class="me">
        <a href="profile.html" class="me-link">
          <div class="avatar sm" data-me-avatar>太</div>
          <span data-me-name>山田 太郎</span>
        </a>
        <a href="login.html" class="link-btn">ログアウト</a>
      </div>
    </header>

    <div class="tabs" data-tabs>
      <button type="button" class="tab is-active" data-feed="all">全体</button>
      <button type="button" class="tab" data-feed="following">フォロー中</button>
    </div>

    <form class="compose" id="composeForm">
      <div class="avatar" data-me-avatar>太</div>
      <div style="flex:1;">
        <textarea data-char-count="280" data-char-count-target="#composeCount" placeholder="いまどうしてる?"></textarea>
        <div class="compose-footer">
          <div class="compose-actions">
            <span>🖼 画像を追加</span>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="char-count"><span id="composeCount">280</span>文字</span>
            <button type="submit" class="btn btn-primary">投稿する</button>
          </div>
        </div>
      </div>
    </form>

    <!-- 全体タイムライン: JSがmock_postsから描画する -->
    <div data-feed-panel="all" id="feedAll"></div>

    <!-- フォロー中タイムライン: フォロー状態と連動して動的に絞り込む(自分の投稿は含めない) -->
    <div data-feed-panel="following" id="feedFollowing" style="display:none;"></div>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
