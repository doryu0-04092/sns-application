<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>プロフィール | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="logo" href="timeline.html">SNS App</a>
      <nav>
        <a href="timeline.html">タイムライン</a>
        <a href="user-search.html">ユーザー検索</a>
        <a href="profile.html">プロフィール</a>
      </nav>
      <div class="me">
        <a href="profile.html" class="me-link">
          <div class="avatar sm" data-me-avatar>太</div>
          <span data-me-name>山田 太郎</span>
        </a>
        <a href="login.html" class="link-btn">ログアウト</a>
      </div>
    </header>

    <div class="profile-cover"></div>
    <div class="profile-main">
      <div class="profile-avatar-row">
        <div class="avatar lg" data-me-avatar>太</div>
        <a href="profile-edit.html" class="btn btn-outline">プロフィールを編集</a>
      </div>
      <div class="profile-name">
        <h1 data-me-name>山田 太郎</h1>
        <div class="handle" data-me-handle>@taro_yamada</div>
      </div>
      <p class="profile-bio">プロダクト開発部所属。SNSアプリを学習課題として開発中です。</p>
      <div class="profile-stats">
        <a href="followers.html?tab=following"><strong>18</strong> <span>フォロー中</span></a>
        <a href="followers.html?tab=followers"><strong>42</strong> <span>フォロワー</span></a>
      </div>
    </div>

    <div class="section-heading">投稿</div>

    <!-- JSがmock_postsから自分(currentUser)の投稿だけを描画する -->
    <div id="profilePostList"></div>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
