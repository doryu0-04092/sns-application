<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>投稿詳細 | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="logo" href="timeline.html">SNS App</a>
      <nav>
        <a href="timeline.html">タイムライン</a>
        <a href="user-search.html">ユーザー検索</a>
        <a href="profile.html">プロフィール</a>
      </nav>
      <div class="me">
        <a href="profile.html" class="me-link">
          <div class="avatar sm" data-me-avatar>太</div>
          <span data-me-name>山田 太郎</span>
        </a>
        <a href="login.html" class="link-btn" data-logout>ログアウト</a>
      </div>
    </header>

    <!-- JSがURLの?postId=(未指定ならdemo-post-1)に対応する投稿をmock_postsから描画する -->
    <div id="postDetailMain"></div>

    <div id="commentsSection">
      <form class="comment-compose" id="commentComposeForm" data-parent-id="">
        <div class="avatar sm" data-me-avatar>太</div>
        <div style="flex:1;">
          <textarea data-char-count="280" data-char-count-target="#commentCount" placeholder="返信をポスト"></textarea>
          <div class="compose-footer">
            <span class="char-count"><span id="commentCount">280</span>文字</span>
            <button type="submit" class="btn btn-primary">返信する</button>
          </div>
        </div>
      </form>

      <div class="section-heading">コメント</div>

      <!-- JSがmock_commentsから描画する(ネスト構造含む) -->
      <div id="commentList"></div>
    </div>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
