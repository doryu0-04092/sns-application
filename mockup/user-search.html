<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ユーザー検索 | SNS Application (mockup)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="logo" href="timeline.html">SNS App</a>
      <nav>
        <a href="timeline.html">タイムライン</a>
        <a href="user-search.html">ユーザー検索</a>
        <a href="profile.html">プロフィール</a>
      </nav>
      <div class="me">
        <a href="profile.html"><div class="avatar sm">太</div></a>
        <a href="login.html" class="link-btn">ログアウト</a>
      </div>
    </header>

    <div class="search-box">
      <input type="text" placeholder="表示名で検索" value="さ" />
    </div>

    <div class="user-row">
      <a href="profile.html"><div class="avatar">花</div></a>
      <div class="info">
        <div class="name">佐藤 花子</div>
        <div class="handle">@hanako_sato</div>
        <div class="bio">広報担当。イベント告知はここから発信します。</div>
      </div>
      <button class="btn btn-follow is-following" type="button">フォロー中</button>
    </div>

    <div class="user-row">
      <a href="profile.html"><div class="avatar">紗</div></a>
      <div class="info">
        <div class="name">中村 紗英</div>
        <div class="handle">@sae_nakamura</div>
        <div class="bio">デザイナー。UI/UXまわりのつぶやきが多めです。</div>
      </div>
      <button class="btn btn-follow" type="button">フォローする</button>
    </div>

    <div class="user-row">
      <a href="profile.html"><div class="avatar">誠</div></a>
      <div class="info">
        <div class="name">松本 誠</div>
        <div class="handle">@makoto_matsumoto</div>
        <div class="bio">サーバーサイドエンジニア。</div>
      </div>
      <button class="btn btn-follow" type="button">フォローする</button>
    </div>
  </div>
  <div class="mockup-badge">静的モックアップ(動作は仮)</div>
  <script src="common.js"></script>
</body>
</html>
