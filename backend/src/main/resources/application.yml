server:
  port: 8080

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sns_application}
    username: ${DB_USER:sns_user}
    password: ${DB_PASSWORD:local_dev_password}

mybatis:
  mapper-locations: classpath:mapper/*.xml
